<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" width="1920" height="500">
  <defs>
    <linearGradient id="skyElf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020d08;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#062210;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3518;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moonElf" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8f8e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0e8a0;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#40b840;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80ff80;stop-opacity:0" />
    </radialGradient>
    <filter id="glowElf">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="500" fill="url(#skyElf)"/>

  <!-- Stars -->
  <g fill="#80ff80" opacity="0.6">
    <circle cx="80" cy="30" r="1.5" filter="url(#glowElf)"/>
    <circle cx="200" cy="55" r="1" filter="url(#glowElf)"/>
    <circle cx="350" cy="20" r="2" filter="url(#glowElf)"/>
    <circle cx="500" cy="45" r="1.5" filter="url(#glowElf)"/>
    <circle cx="650" cy="25" r="1" filter="url(#glowElf)"/>
    <circle cx="780" cy="60" r="1.5" filter="url(#glowElf)"/>
    <circle cx="1100" cy="35" r="2" filter="url(#glowElf)"/>
    <circle cx="1250" cy="15" r="1" filter="url(#glowElf)"/>
    <circle cx="1400" cy="50" r="1.5" filter="url(#glowElf)"/>
    <circle cx="1550" cy="30" r="1" filter="url(#glowElf)"/>
    <circle cx="1700" cy="55" r="2" filter="url(#glowElf)"/>
    <circle cx="1850" cy="20" r="1.5" filter="url(#glowElf)"/>
  </g>
  <g fill="white" opacity="0.5">
    <circle cx="130" cy="70" r="1"/><circle cx="290" cy="40" r="1"/><circle cx="440" cy="75" r="1"/>
    <circle cx="580" cy="55" r="1"/><circle cx="720" cy="80" r="1"/><circle cx="860" cy="40" r="1"/>
    <circle cx="980" cy="65" r="1"/><circle cx="1150" cy="75" r="1"/><circle cx="1320" cy="45" r="1"/>
    <circle cx="1470" cy="80" r="1"/><circle cx="1620" cy="60" r="1"/><circle cx="1780" cy="40" r="1"/>
  </g>

  <!-- Moon (Eärendil's star) -->
  <circle cx="960" cy="90" r="120" fill="url(#moonElf)" opacity="0.4"/>
  <circle cx="960" cy="90" r="55" fill="#d8f8d0" filter="url(#softBlur)"/>
  <circle cx="960" cy="90" r="40" fill="#e8ffe0"/>
  <!-- Eärendil - 8 pointed star -->
  <g transform="translate(960,90)" fill="#fffce0" filter="url(#glowElf)">
    <polygon points="0,-20 3,-3 20,0 3,3 0,20 -3,3 -20,0 -3,-3"/>
  </g>

  <!-- Background forest (dark deep) -->
  <!-- Back row of trees -->
  <g fill="#041508" opacity="0.8">
    <ellipse cx="0" cy="320" rx="60" ry="120"/>
    <ellipse cx="80" cy="300" rx="50" ry="110"/>
    <ellipse cx="170" cy="310" rx="55" ry="115"/>
    <ellipse cx="260" cy="295" rx="60" ry="125"/>
    <ellipse cx="360" cy="305" rx="55" ry="120"/>
    <ellipse cx="460" cy="290" rx="60" ry="130"/>
    <ellipse cx="560" cy="300" rx="55" ry="120"/>
    <ellipse cx="660" cy="285" rx="60" ry="130"/>
    <!-- gap for platform -->
    <ellipse cx="1260" cy="285" rx="60" ry="130"/>
    <ellipse cx="1360" cy="300" rx="55" ry="120"/>
    <ellipse cx="1460" cy="290" rx="60" ry="130"/>
    <ellipse cx="1560" cy="305" rx="55" ry="120"/>
    <ellipse cx="1660" cy="295" rx="60" ry="125"/>
    <ellipse cx="1760" cy="310" rx="55" ry="115"/>
    <ellipse cx="1860" cy="300" rx="50" ry="110"/>
    <ellipse cx="1920" cy="320" rx="60" ry="120"/>
  </g>

  <!-- Mallorn trees (golden, glowing) - the heart of Lothlórien -->
  <!-- Central large mallorn trunks -->
  <rect x="870" y="150" width="18" height="320" fill="#3a2a0a" rx="4"/>
  <rect x="1030" y="170" width="16" height="300" fill="#3a2a0a" rx="4"/>
  <rect x="950" y="130" width="20" height="340" fill="#4a3510" rx="4"/>
  <!-- Branches -->
  <line x1="879" y1="200" x2="820" y2="160" stroke="#3a2a0a" stroke-width="6"/>
  <line x1="879" y1="240" x2="810" y2="210" stroke="#3a2a0a" stroke-width="5"/>
  <line x1="960" y1="180" x2="900" y2="140" stroke="#4a3510" stroke-width="6"/>
  <line x1="960" y1="200" x2="1020" y2="150" stroke="#4a3510" stroke-width="6"/>
  <line x1="1038" y1="220" x2="1100" y2="180" stroke="#3a2a0a" stroke-width="5"/>
  <!-- Golden leaves canopy -->
  <ellipse cx="860" cy="155" rx="100" ry="60" fill="#c8a820" opacity="0.7" filter="url(#glowElf)"/>
  <ellipse cx="960" cy="130" rx="130" ry="70" fill="#d4b430" opacity="0.75" filter="url(#glowElf)"/>
  <ellipse cx="1050" cy="160" rx="100" ry="60" fill="#c8a820" opacity="0.7" filter="url(#glowElf)"/>
  <!-- Inner bright canopy -->
  <ellipse cx="960" cy="140" rx="90" ry="50" fill="#e8cc50" opacity="0.5" filter="url(#softBlur)"/>

  <!-- Caras Galadhon - Flet platforms in trees -->
  <!-- Main flet platform -->
  <ellipse cx="960" cy="300" rx="90" ry="12" fill="#5a4020"/>
  <rect x="895" y="285" width="130" height="15" rx="3" fill="#6a5030"/>
  <!-- Railing posts -->
  <g fill="#8a6840" stroke="none">
    <rect x="897" y="272" width="3" height="13"/>
    <rect x="910" y="270" width="3" height="15"/>
    <rect x="925" y="270" width="3" height="15"/>
    <rect x="940" y="270" width="3" height="15"/>
    <rect x="960" y="268" width="3" height="17"/>
    <rect x="980" y="270" width="3" height="15"/>
    <rect x="995" y="270" width="3" height="15"/>
    <rect x="1010" y="270" width="3" height="15"/>
    <rect x="1022" y="272" width="3" height="13"/>
  </g>
  <!-- Small structure on flet -->
  <rect x="930" y="258" width="60" height="27" rx="2" fill="#7a5828"/>
  <polygon points="930,258 960,240 990,258" fill="#5a3a10"/>
  <!-- Glowing windows -->
  <rect x="940" y="262" width="10" height="10" rx="1" fill="#ffe880" opacity="0.9" filter="url(#glowElf)"/>
  <rect x="970" y="262" width="10" height="10" rx="1" fill="#ffe880" opacity="0.9" filter="url(#glowElf)"/>

  <!-- Lanterns hanging from branches -->
  <line x1="860" y1="230" x2="860" y2="260" stroke="#6a5020" stroke-width="1.5"/>
  <ellipse cx="860" cy="265" rx="8" ry="10" fill="#ffd840" opacity="0.8" filter="url(#glowElf)"/>
  <line x1="1060" y1="230" x2="1060" y2="260" stroke="#6a5020" stroke-width="1.5"/>
  <ellipse cx="1060" cy="265" rx="8" ry="10" fill="#ffd840" opacity="0.8" filter="url(#glowElf)"/>

  <!-- Falling golden leaves -->
  <g fill="#d4b430" opacity="0.6">
    <ellipse cx="800" cy="380" rx="5" ry="3" transform="rotate(-30,800,380)"/>
    <ellipse cx="850" cy="410" rx="4" ry="2.5" transform="rotate(20,850,410)"/>
    <ellipse cx="1050" cy="370" rx="5" ry="3" transform="rotate(15,1050,370)"/>
    <ellipse cx="1100" cy="400" rx="4" ry="2.5" transform="rotate(-20,1100,400)"/>
    <ellipse cx="920" cy="390" rx="4" ry="2.5" transform="rotate(35,920,390)"/>
    <ellipse cx="990" cy="420" rx="5" ry="3" transform="rotate(-15,990,420)"/>
  </g>

  <!-- Ground / mist -->
  <rect x="0" y="420" width="1920" height="80" fill="#020a04" opacity="0.95"/>
  <!-- Mist effect -->
  <ellipse cx="400" cy="430" rx="400" ry="30" fill="#1a3a1a" opacity="0.4"/>
  <ellipse cx="1100" cy="435" rx="500" ry="25" fill="#1a3a1a" opacity="0.3"/>

  <!-- Text -->
  <text x="960" y="468" font-family="Georgia, serif" font-size="22" fill="#80c860" text-anchor="middle" letter-spacing="8" opacity="0.85">ELFES DE LA TERRE DU MILIEU</text>
  <text x="200" y="390" font-family="Georgia, serif" font-size="52" fill="#80d840" text-anchor="start" filter="url(#glowElf)" font-weight="bold">Caras Galadhon</text>
  <text x="200" y="428" font-family="Georgia, serif" font-size="22" fill="#508040" text-anchor="start" letter-spacing="3">La Cité d'Or de Lórien</text>
  <line x1="150" y1="440" x2="650" y2="440" stroke="#80c840" stroke-width="1" opacity="0.5"/>
</svg>
